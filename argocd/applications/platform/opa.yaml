apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opa
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    description: "Open Policy Agent (OPA) – centralized policy decision point"
  labels:
    app.kubernetes.io/name: opa
    app.kubernetes.io/part-of: wapps
    wapps.ai/tag: platform
spec:
  project: wapps-platform
  source:
    repoURL: https://github.com/Gitarzysta92/platform-development-kit.git
    targetRevision: main
    path: cluster/opa
  destination:
    server: https://kubernetes.default.svc
    namespace: wapps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

