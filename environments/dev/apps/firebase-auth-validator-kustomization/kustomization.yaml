apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wapps

resources:
  - ../../../../apps/services/firebase-auth-validator/provisioning/k8s

patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: firebase-auth-validator
  - path: ingress-patch.yaml
    target:
      kind: Ingress
      name: firebase-auth-validator-ingress

