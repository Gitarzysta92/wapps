apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wapps

resources:
  - github.com/Gitarzysta92/platform-development-kit//cluster/minio?ref=main

patches:
  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: minio-api.development.wapps.ai
      - op: replace
        path: /spec/rules/1/host
        value: minio-console.development.wapps.ai
      - op: replace
        path: /spec/rules/2/host
        value: localcdn.development.wapps.ai
    target:
      kind: Ingress
      name: minio-ingress

# Note: Namespace and Helm resources managed by minio ArgoCD app
# This overlay only manages environment-specific ingress configuration

