apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wapps

resources:
  - github.com/Gitarzysta92/platform-development-kit//cluster/mongo-express?ref=main

patches:
  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: mongo-express.development.wapps.ai
    target:
      kind: Ingress
      name: mongo-express-ingress

