apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mysql

resources:
  - github.com/Gitarzysta92/platform-development-kit//cluster/mysql-adminer?ref=main

patches:
  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: mysql-adminer.development.wapps.ai
    target:
      kind: Ingress
      name: mysql-adminer-ingress

