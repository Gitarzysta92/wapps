apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - github.com/Gitarzysta92/platform-development-kit//cluster/argocd?ref=main

patches:
  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: argocd.development.wapps.ai
    target:
      kind: Ingress
      name: argocd-ingress

